<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Медсестра — голосовой ассистент</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f0eb; color: #333; height: 100dvh; display: flex; flex-direction: column; }
    header { background: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0d9d0; }
    header h1 { font-size: 1.1rem; color: #7a5c5c; }
    header nav a { margin-left: 14px; color: #7a5c5c; text-decoration: none; font-size: 0.9rem; }
    #transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
    .msg-user { background: #e8f4fd; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-model { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .msg b { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    #input-area { background: #fff; border-top: 1px solid #e0d9d0; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; }
    #text-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px; font-size: 1rem; resize: none; max-height: 120px; outline: none; }
    #text-input:focus { border-color: #9b7b7b; }
    #btn-text-send { background: #9b7b7b; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
    #btn-text-send:hover { background: #7a5c5c; }
    #status { font-size: 0.8rem; color: #999; padding: 4px 16px; text-align: center; background: #f5f0eb; }
  </style>
</head>
<body>
  <header>
    <h1>🩺 Медсестра</h1>
    <nav>
      <a href="/history.html">История</a>
      <a href="/diary.html">Дневник</a>
    </nav>
  </header>

  <div id="transcript">
    <div class="msg msg-model">
      <b>Медсестра</b>
      Здравствуйте. Я здесь и готова вас выслушать. Как вы себя чувствуете сегодня?
    </div>
  </div>

  <div id="status">Готово</div>

  <div id="input-area">
    <textarea id="text-input" rows="1" placeholder="Напишите сообщение..."></textarea>
    <button id="btn-text-send">↑</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
