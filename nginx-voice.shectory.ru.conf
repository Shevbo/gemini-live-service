server {
    listen 80;
    server_name voice.shectory.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name voice.shectory.ru;

    ssl_certificate     /etc/letsencrypt/live/voice.shectory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.shectory.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket для голосового стриминга (длинный таймаут!)
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }
}
